<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GARER — Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #05040a;
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    h1 { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,.45); font-size: 13px; margin-bottom: 32px; }

    /* LOGIN — stesso stile admin */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: #05040a;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: min(400px, 90vw);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 24px;
    }
    .login-box h2 { margin: 0 0 6px; }
    .hr { height: 1px; background: rgba(255,255,255,.10); margin: 14px 0; }

    #scannerBox {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 16px;
    }
    .user-chip { font-size: 13px; color: rgba(255,255,255,.4); }
    #reader { width: min(340px, 90vw) !important; border-radius: 16px; overflow: hidden; }
    #result {
      width: min(340px, 90vw);
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.4;
      display: none;
    }
    #result small { font-weight: 400; font-size: 14px; }
    .ok    { background: rgba(0,200,100,.15); border: 2px solid rgba(0,200,100,.45); }
    .error { background: rgba(255,50,50,.15);  border: 2px solid rgba(255,50,50,.45); }
    .action-btn {
      width: min(340px, 90vw);
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
    }
    #resetBtn { background: linear-gradient(135deg, #9b00ff, #ff35d4); color: #fff; display: none; }
    #logoutBtn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.10); color: rgba(255,255,255,.6); font-size: 13px; padding: 10px; }
    .btn--primary {
      border-color: rgba(155,0,255,.35);
      background: linear-gradient(135deg, rgba(155,0,255,.92), rgba(255,53,212,.70));
      color: #fff;
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid rgba(155,0,255,.35);
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY — identico ad admin -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2 style="margin:0 0 6px">Staff Login</h2>
      <small style="color:rgba(255,255,255,.5)">Accesso riservato allo staff GARER</small>
      <div class="hr"></div>
      <button class="btn--primary" id="loginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" />
        Accedi con Google
      </button>
    </div>
  </div>

  <!-- SCANNER -->
  <div id="scannerBox">
    <p class="user-chip" id="userChip"></p>
    <div id="reader"></div>
    <div id="result"></div>
    <button class="action-btn" id="resetBtn" onclick="resetScanner()">📷 Scansiona altro</button>
    <button class="action-btn" id="logoutBtn">Esci</button>
  </div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC5iX2PkWxSrbRObyPFzm2OIqPB8eed_0c",
  authDomain: "garer-777.firebaseapp.com",
  databaseURL: "https://garer-777-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "garer-777",
  storageBucket: "garer-777.firebasestorage.app",
  messagingSenderId: "353631922937",
  appId: "1:353631922937:web:d61249d6997e86ce3e9028"
};

const app      = initializeApp(firebaseConfig);
const db       = getDatabase(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

let scanning       = true;
let scannerStarted = false;

const loginOverlay = document.getElementById('loginOverlay');
const scannerBox   = document.getElementById('scannerBox');
const risultato    = document.getElementById('result');
const resetBtn     = document.getElementById('resetBtn');

// ── LOGIN — identico ad admin ─────────────────────────────
document.getElementById('loginBtn').addEventListener('click', async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    console.error(e);
    alert("Login fallito. Riprova.");
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

// ── AUTH STATE — identico ad admin ───────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) {
    loginOverlay.style.display = 'flex';
    scannerBox.style.display   = 'none';
    return;
  }

  const emailKey = user.email.replace(/\./g, '-');

  try {
    const snap = await get(ref(db, `admins/${emailKey}`));

    // Autorizzato se esiste nel nodo admins (true O false)
    if (!snap.exists()) {
      await signOut(auth);
      alert('⛔ Account non autorizzato.');
      return;
    }

    // ✅ Esiste → può usare lo scanner
    loginOverlay.style.display = 'none';
    scannerBox.style.display   = 'flex';
    document.getElementById('userChip').textContent = `👤 ${user.email}`;

    if (!scannerStarted) {
      scannerStarted = true;
      requestAnimationFrame(() => requestAnimationFrame(avviaScanner));
    }

  } catch(e) {
    console.error(e);
    alert('❌ Errore di connessione.');
  }
});


// ── SCANNER ───────────────────────────────────────────────
function avviaScanner() {
  const scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: { width: 250, height: 250 } },
    false
  );

  scanner.render(async (id) => {
    if (!scanning) return;
    scanning = false;

    try {
      const snap = await get(ref(db, `biglietti/${id}`));

      if (!snap.exists()) {
        mostraRisultato('error', `❌ Biglietto non trovato<br><small>${id}</small>`);
      } else {
        const dati = snap.val();
        if (dati.usato) {
          mostraRisultato('error', `⚠️ GIÀ USATO<br><small>${dati.nome} — ${dati.evento}</small>`);
        } else {
          await update(ref(db, `biglietti/${id}`), { usato: true });
          mostraRisultato('ok', `✅ ACCESSO OK<br><small>${dati.nome} — ${dati.evento}</small>`);
        }
      }
    } catch {
      mostraRisultato('error', '❌ Errore connessione DB');
    }

    resetBtn.style.display = 'block';
  });
}

function mostraRisultato(tipo, html) {
  risultato.className     = tipo;
  risultato.innerHTML     = html;
  risultato.style.display = 'block';
}

window.resetScanner = function() {
  scanning                = true;
  risultato.style.display = 'none';
  resetBtn.style.display  = 'none';
};
</script>
</body>
</html>
